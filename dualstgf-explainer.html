// ─── UTILITIES ───
function useInView(ref) {
  const [visible, setVisible] = useState(false);
  useEffect(() => {
    if (!ref.current) return;
    const obs = new IntersectionObserver(
      ([e]) => { if (e.isIntersecting) setVisible(true); },
      { threshold: 0.15 }
    );
    obs.observe(ref.current);
    return () => obs.disconnect();
  }, [ref]);
  return visible;
}

function FadeIn({ children, delay = 0, className = "" }) {
  const ref = useRef(null);
  const visible = useInView(ref);
  return (
    <div ref={ref} className={className} style={{
      opacity: visible ? 1 : 0,
      transform: visible ? "translateY(0)" : "translateY(32px)",
      transition: `all 0.7s cubic-bezier(0.22,1,0.36,1) ${delay}s`,
    }}>
      {children}
    </div>
  );
}

function Tag({ color, children }) {
  return (
    <span style={{
      display: "inline-block", padding: "3px 10px", borderRadius: 4,
      fontSize: 11, fontWeight: 700, letterSpacing: "0.06em",
      textTransform: "uppercase", background: color + "18",
      color: color, border: `1px solid ${color}30`,
    }}>
      {children}
    </span>
  );
}

function SectionTitle({ tag, tagColor, title, subtitle }) {

}

}

          alt="DualSTGF full architecture diagram showing Input Data, OC-aware node dynamics extraction, Temporal Branch (1DCNN, GATv2, EdgeGRU), Spectral Branch (rFFT, Band Mixer, GATv2), JS Divergence between adjacency matrices, Gated Fusion, Reverse GRU Decoder, and Fused Anomaly Scoring"

      </div>
      <p style={{ color: MUTED, fontSize: 12, marginTop: 10, textAlign: "center" }}>

      </p>

        gridTemplateColumns: "repeat(auto-fit, minmax(260px, 1fr))", gap: 12,
      }}>
        {[
          { icon: "\u23F1", title: "Temporal Branch", desc: "1DCNN filters noise, Node GRU encodes per-sensor dynamics with OC context, GATv2 + EdgeGRU builds a dynamic dependency graph (A_temp) tracking how inter-sensor relationships evolve.", color: GOLD },
          { icon: "\u301C", title: "Spectral Branch", desc: "rFFT extracts frequency-domain magnitudes, Band Mixer creates spectral embeddings with OC context, single-shot GATv2 builds a frequency-domain dependency graph (A_freq).", color: BLUE },
          { icon: "\u2696", title: "JS Divergence", desc: "Jensen-Shannon divergence measures structural disagreement between A_temp and A_freq. Low during normal operation, spikes when faults cause asymmetric disruptions across domains.", color: GREEN },
          { icon: "\u2699", title: "Gated Fusion", desc: "Learned sigmoid gate adaptively combines temporal and spectral GNN embeddings: z_fused = g \u2299 z_temp + (1-g) \u2299 z_freq.", color: "#A78BFA" },

            <div style={{ color: TEXT, fontSize: 13, lineHeight: 1.6 }}>{c.desc}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

      <div style={{ display: "flex", gap: 8, marginBottom: 24 }}>
        {["pronto", "ashrae"].map((k) => (
          <button key={k} onClick={() => setDs(k)} style={{
            background: ds === k ? BLUE + "20" : CARD,
            border: `1px solid ${ds === k ? BLUE : BORDER}`,
            borderRadius: 8, padding: "8px 18px",
            color: ds === k ? BLUE : TEXT,
            fontSize: 13, fontWeight: 600, transition: "all 0.2s",
          }}>
            {k === "pronto" ? "PRONTO" : "ASHRAE"}
          </button>
        ))}
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(200px, 1fr))", gap: 12 }}>
        {data.map((d) => (
          <div key={d.config} style={{
            background: d.delta === 0 ? GREEN + "10" : CARD,
            border: `1px solid ${d.delta === 0 ? GREEN + "40" : BORDER}`,
            borderRadius: 10, padding: "16px 18px", transition: "all 0.2s",
          }}>
            <div style={{ fontSize: 12, color: d.delta === 0 ? GREEN : TEXT, fontWeight: 600, marginBottom: 8 }}>
              {d.config}
            </div>
            <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 22, fontWeight: 800, color: d.delta === 0 ? GREEN : "#fff" }}>
              {d.AUC.toFixed(3)}
            </div>
            {d.delta !== 0 && (
              <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 12, color: RED, marginTop: 4 }}>
                {d.delta.toFixed(3)} AUC
              </div>
            )}
          </div>
        ))}
      </div>

      <div style={{ marginTop: 20, background: CARD, border: `1px solid ${BORDER}`, borderRadius: 10, padding: 20 }}>
        <div style={{ color: "#fff", fontWeight: 700, fontSize: 14, marginBottom: 8 }}>Key Takeaway</div>
        <p style={{ color: TEXT, fontSize: 14, lineHeight: 1.7, margin: 0 }}>
          {ds === "pronto"
            ? "On PRONTO, removing the divergence mechanism entirely causes the largest drop (\u22120.246 AUC), confirming structural disagreement is the primary anomaly signal. Replacing gated fusion with concatenation (\u22120.260) is similarly devastating, showing the importance of adaptive view weighting."
            : "On ASHRAE, the divergence mechanism again causes the largest drop when removed (\u22120.042 AUC). The spectral-only model already reaches 0.980, reflecting that HVAC faults produce clear frequency signatures. Both branches and their divergence remain necessary for peak performance."}
        </p>
      </div>
    </div>
  );
}
