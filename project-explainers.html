// ─── SHARED COMPONENTS ───
function useInView(ref) {
  const [visible, setVisible] = useState(false);
  useEffect(() => {
    if (!ref.current) return;
    const obs = new IntersectionObserver(
      ([e]) => { if (e.isIntersecting) setVisible(true); },
      { threshold: 0.15 }
    );
    obs.observe(ref.current);
    return () => obs.disconnect();
  }, [ref]);
  return visible;
}

function FadeIn({ children, delay = 0, className = "" }) {
  const ref = useRef(null);
  const visible = useInView(ref);
  return (
    <div ref={ref} className={className} style={{
      opacity: visible ? 1 : 0,
      transform: visible ? "translateY(0)" : "translateY(32px)",
      transition: `all 0.7s cubic-bezier(0.22,1,0.36,1) ${delay}s`,
    }}>
      {children}
    </div>
  );
}

function Tag({ color, children }) {
  return (
    <span style={{
      display: "inline-block", padding: "3px 10px", borderRadius: 4,
      fontSize: 11, fontWeight: 700, letterSpacing: "0.06em",
      textTransform: "uppercase", background: color + "18",
      color, border: `1px solid ${color}30`,
    }}>
      {children}
    </span>
  );
}

function SectionTitle({ tag, tagColor, title, subtitle }) {

    <div style={{ marginBottom: 40 }}>

        fontFamily: "'Playfair Display', 'DM Serif Display', Georgia, serif",

  );
}

}

function DualSTGFArchitectureImage() {
  const [zoomed, setZoomed] = useState(false);
  useEffect(() => {
    if (!zoomed) return;
    const handleEsc = (e) => { if (e.key === "Escape") setZoomed(false); };
    window.addEventListener("keydown", handleEsc);
    return () => window.removeEventListener("keydown", handleEsc);
  }, [zoomed]);

  return (
    <div>
      <div className={`arch-img-wrapper${zoomed ? " zoomed" : ""}`}
        onClick={() => setZoomed(!zoomed)} role="button" tabIndex={0}
        aria-label={zoomed ? "Click to close" : "Click to zoom architecture diagram"}
        onKeyDown={(e) => { if (e.key === "Enter" || e.key === " ") setZoomed(!zoomed); }}>
        <img src="/assets/img/dualstgf-architecture-p0.png"
          alt="DualSTGF full architecture diagram"
          style={{ width: "100%", display: "block", padding: zoomed ? 0 : 16 }} />
      </div>
      <p style={{ color: MUTED, fontSize: 12, marginTop: 10, textAlign: "center" }}>
        Click the diagram to zoom &middot; Press Escape to close
      </p>
      <div style={{ marginTop: 24, display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(260px, 1fr))", gap: 12 }}>
        {[
          { icon: "\u23F1", title: "Temporal Branch", desc: "1DCNN filters noise, Node GRU encodes per-sensor dynamics with OC context, GATv2 + EdgeGRU builds a dynamic dependency graph (A_temp).", color: GOLD },
          { icon: "\u301C", title: "Spectral Branch", desc: "rFFT extracts frequency-domain magnitudes, Band Mixer creates spectral embeddings with OC context, single-shot GATv2 builds A_freq.", color: BLUE },
          { icon: "\u2696", title: "JS Divergence", desc: "Jensen-Shannon divergence measures structural disagreement between A_temp and A_freq. Low during normal operation, spikes during faults.", color: GREEN },
          { icon: "\u2699", title: "Gated Fusion", desc: "Learned sigmoid gate adaptively combines temporal and spectral GNN embeddings: z_fused = g \u2299 z_temp + (1-g) \u2299 z_freq.", color: PURPLE },
          { icon: "\u21A9", title: "Reverse GRU Decoder", desc: "Reconstructs the input window in reverse temporal order from fused embeddings. Reconstruction error forms the base anomaly signal.", color: "#F9A8D4" },
          { icon: "\u26A0", title: "Fused Anomaly Score", desc: "Combines topology-aware reconstruction error with z-scored JS divergence: s = s_topo + \u03B2 \u00B7 z_div.", color: RED },
        ].map((c) => (
          <div key={c.title} style={{ background: CARD, border: `1px solid ${BORDER}`, borderRadius: 10, padding: 20 }}>
            <div style={{ fontSize: 22, marginBottom: 8 }}>{c.icon}</div>
            <div style={{ color: c.color, fontWeight: 700, fontSize: 14, marginBottom: 6 }}>{c.title}</div>
            <div style={{ color: TEXT, fontSize: 13, lineHeight: 1.6 }}>{c.desc}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

  const ashraeAbl = [
    { config: "Full Model", AUC: 0.982, delta: 0 },

    { config: "w/o Spectral", AUC: 0.980, delta: -0.001 },

    { config: "JS \u2192 KL", AUC: 0.965, delta: -0.017 },
    { config: "Gated \u2192 Sum", AUC: 0.980, delta: -0.002 },
  ];
  const data = ds === "pronto" ? prontoAbl : ashraeAbl;

  return (
    <div>
      <div style={{ display: "flex", gap: 8, marginBottom: 24 }}>
        {["pronto", "ashrae"].map((k) => (
          <button key={k} onClick={() => setDs(k)} style={{

          }}>{k === "pronto" ? "PRONTO" : "ASHRAE"}</button>

      </div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(200px, 1fr))", gap: 12 }}>
        {data.map((d) => (
          <div key={d.config} style={{
            background: d.delta === 0 ? GREEN + "10" : CARD, border: `1px solid ${d.delta === 0 ? GREEN + "40" : BORDER}`,
            borderRadius: 10, padding: "16px 18px", transition: "all 0.2s",
          }}>
            <div style={{ fontSize: 12, color: d.delta === 0 ? GREEN : TEXT, fontWeight: 600, marginBottom: 8 }}>{d.config}</div>
            <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 22, fontWeight: 800, color: d.delta === 0 ? GREEN : "#fff" }}>{d.AUC.toFixed(3)}</div>
            {d.delta !== 0 && <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 12, color: RED, marginTop: 4 }}>{d.delta.toFixed(3)} AUC</div>}
          </div>
        ))}
      </div>
      <div style={{ marginTop: 20, background: CARD, border: `1px solid ${BORDER}`, borderRadius: 10, padding: 20 }}>
        <div style={{ color: "#111827", fontWeight: 700, fontSize: 14, marginBottom: 8 }}>Key Takeaway</div>
        <p style={{ color: TEXT, fontSize: 14, lineHeight: 1.7, margin: 0 }}>
          {ds === "pronto"
            ? "On PRONTO, removing the divergence mechanism causes the largest drop (\u22120.246 AUC). Replacing gated fusion with concatenation (\u22120.260) is similarly devastating, confirming adaptive view weighting is critical."
            : "On ASHRAE, the divergence mechanism again causes the largest drop (\u22120.042 AUC). Both branches and their divergence remain necessary for peak performance."}
        </p>
      </div>
    </div>
  );
}

];

  dualstgf: DualSTGFProject,
  dualgraphshm: DualGraphSHMProject,
  mitacs: MitacsProject,
  necfe: NECFEProject,
  indoornav: IndoorNavProject,
  ergomate: ErgomateProject,
};

function App() {
  const [active, setActive] = useState(() => {
    const hash = window.location.hash.replace("#", "");
    return PROJECTS.find(p => p.id === hash)?.id || "ulma";
  });

  useEffect(() => {
    window.location.hash = active;
    window.scrollTo({ top: 0, behavior: "smooth" });
  }, [active]);

  const ActiveComponent = PROJECT_COMPONENTS[active];

  return (
    <div>
      {/* Top nav */}
      <nav style={{
        position: "sticky", top: 0, zIndex: 100,
        background: DARKER + "ee", backdropFilter: "blur(12px)",
        borderBottom: `1px solid ${BORDER}`,
        display: "flex", alignItems: "center",
        padding: "0 24px", height: 52,
      }}>
        <a href="/" style={{ color: "#111827", textDecoration: "none", fontWeight: 700, fontSize: 13, paddingRight: 16, borderRight: `1px solid ${BORDER}`, marginRight: 8, whiteSpace: "nowrap", flexShrink: 0 }}>
          &larr; Home
        </a>

        {/* Project tabs - scrollable */}
        <div style={{ display: "flex", gap: 2, marginLeft: 4, overflowX: "auto", flexShrink: 1, minWidth: 0 }}>
          {PROJECTS.map(p => (
            <button key={p.id} onClick={() => setActive(p.id)} style={{
              padding: "6px 14px", borderRadius: 6, fontSize: 12, fontWeight: 600,
              background: active === p.id ? p.color + "18" : "transparent",
              color: active === p.id ? p.color : MUTED,
              border: active === p.id ? `1px solid ${p.color}40` : "1px solid transparent",
              transition: "all 0.2s", whiteSpace: "nowrap", flexShrink: 0,
            }}>
              {p.label}
            </button>
          ))}
        </div>

        {/* Right links */}
        <div style={{ marginLeft: "auto", display: "flex", gap: 16, fontSize: 12, flexShrink: 0, paddingLeft: 12 }}>
          <a href="/publications.html" style={{ color: MUTED, textDecoration: "none", fontWeight: 600, whiteSpace: "nowrap" }}>Publications</a>
        </div>
      </nav>

      <div id="main-content" style={{ maxWidth: 960, margin: "0 auto", padding: "0 24px" }}>
        <ActiveComponent />
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
